<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Filimto | فیلم</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="transfer-screen" id="transfer">

<div class="transfer-icon">🎬</div>

<h2>
در حال آماده‌سازی انتقال به فیلیمو...
</h2>

<div class="loading-bar">

<div class="loading"></div>

</div>

<p>
لطفاً تا پایان انتقال
<br>
این صفحه را نبندید.
</p>

<p class="thanks">
❤️
<br>
از اینکه FILIMTO را انتخاب کرده‌اید،
<br>
سپاسگزاریم.
</p>

</div>
  
<header>

<div class="logo">FILIMTO</div>

<nav>
<a href="index.html">خانه</a>
<a href="#">فیلم</a>
<a href="#">سریال</a>
</nav>

</header>



<section class="movie-page" id="moviePage">

</section>



<script>

const params = new URLSearchParams(window.location.search);

const id = params.get("id");


fetch("movies.json")
.then(response => response.json())
.then(movies => {


const movie = movies.find(item => item.id == id);


if(movie){


document.getElementById("moviePage").innerHTML = `


<img class="big-poster"
src="${movie.poster}">


<div class="movie-info">


<h1>${movie.title}</h1>


<p>
${movie.description}
</p>


<div class="details">

<span>🎭 ژانر: ${movie.genre}</span>

<span>📅 سال: ${movie.year}</span>

<span>⭐ امتیاز: ${movie.rating}</span>

</div>



<button onclick="watchMovie('${movie.watch || movie.playlist}')">

▶ تماشا

</button>



<button>

📺 نمایش قسمت‌ها

</button>


</div>


`;

}


});



function watchMovie(link){

const transfer = document.getElementById("transfer");

transfer.classList.add("show");

// جلوگیری از کلیک دوباره
document.body.style.pointerEvents = "none";

setTimeout(function(){

window.open(link,"_blank");

// دوباره صفحه را به حالت عادی برگردان
transfer.classList.remove("show");
document.body.style.pointerEvents = "auto";

},5000);

}


</script>



</body>
</html>
