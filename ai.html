<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FilimTo AI</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="ai-page">

<h1 class="ai-logo">

🤖 FILIMTO AI

</h1>

<p class="ai-text">

هر فیلمی را از من بپرس...

</p>

<input
id="searchBox"
type="text"
placeholder="مثلاً: آیا فیلم جوکر در فیلیمو هست؟">

<br><br>

<button onclick="startAI()">

🔍 جستجو

</button>

  <div class="quick-title">
🔥 سوال‌های آماده
</div>

<div class="quick-chat">

<button onclick="fillQuestion('زخم کاری')">زخم کاری</button>

<button onclick="fillQuestion('پایتخت')">پایتخت</button>

<button onclick="fillQuestion('جوکر')">جوکر</button>

<button onclick="fillQuestion('جیران')">جیران</button>

<button onclick="fillQuestion('پوست شیر')">پوست شیر</button>

<button onclick="fillQuestion('یاغی')">یاغی</button>

<button onclick="fillQuestion('قورباغه')">قورباغه</button>

<button onclick="fillQuestion('فیلم اکشن')">فیلم اکشن</button>

<button onclick="fillQuestion('فیلم ترسناک')">فیلم ترسناک</button>

<button onclick="fillQuestion('فیلم کمدی')">فیلم کمدی</button>

</div>
  
<br><br>

<div id="status">

</div>

</div>

<script>

function startAI(){

const text=document.getElementById("searchBox").value.toLowerCase();

const status=document.getElementById("status");

const steps=[

"🧠 در حال تحلیل درخواست...",

"🔍 لطفاً کمی صبر کنید...",

"🎬 در حال جستجوی هوشمند...",

"📚 بررسی آرشیو فیلم‌ها..."

];

let i=0;

status.innerHTML="";

const timer=setInterval(()=>{

status.innerHTML=steps[i];

i++;

if(i>=steps.length){

clearInterval(timer);

status.innerHTML="✅ نتیجه پیدا شد. در حال انتقال...";

setTimeout(()=>{

const query=encodeURIComponent(text);

window.location.href=
"https://www.filimo.com/search?q="+query;

},1800);

}

},1200);

}

  function fillQuestion(text){
    document.getElementById("searchBox").value = text;
  }
  
</script>

</body>

</html>
