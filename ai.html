<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FilimTo AI</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="ai-page">

<h1 class="ai-logo">

🤖 FILIMTO AI

</h1>

<p class="ai-text">

هر فیلمی را از من بپرس...

</p>

<input
id="searchBox"
type="text"
placeholder="مثلاً: آیا فیلم جوکر در فیلیمو هست؟">

<br><br>

<button onclick="startAI()">

🔍 جستجو

</button>

  <div class="quick-title">
🔥 سوال‌های آماده
</div>

<div class="quick-chat">

<button onclick="fillQuestion('زخم کاری')">زخم کاری</button>

<button onclick="fillQuestion('پایتخت')">پایتخت</button>

<button onclick="fillQuestion('جوکر')">جوکر</button>

<button onclick="fillQuestion('جیران')">جیران</button>

<button onclick="fillQuestion('پوست شیر')">پوست شیر</button>

<button onclick="fillQuestion('یاغی')">یاغی</button>

<button onclick="fillQuestion('قورباغه')">قورباغه</button>

<button onclick="fillQuestion('فیلم اکشن')">فیلم اکشن</button>

<button onclick="fillQuestion('فیلم ترسناک')">فیلم ترسناک</button>

<button onclick="fillQuestion('فیلم کمدی')">فیلم کمدی</button>

</div>
  
<br><br>

<div id="status">

</div>

</div>

<script>

const responses = {

"زخم کاری":`🎬 زخم کاری

اگر منظورت سریال «زخم کاری» باشد، انتخاب خیلی خوبی است.

این مجموعه یکی از محبوب‌ترین سریال‌های ایرانی در ژانر درام و جنایی است که داستان آن درباره قدرت، ثروت، خیانت و انتقام روایت می‌شود.

⭐ امتیاز کاربران: 8.4/10
🎭 ژانر: درام، جنایی
🎬 کارگردان: محمدحسین مهدویان
👥 بازیگران: جواد عزتی، رعنا آزادی‌ور، هانیه توسلی و...

💡 اگر زخم کاری را دوست داشتی، پیشنهاد می‌کنم پوست شیر و قورباغه را هم ببینی.`,

"پایتخت":`📺 پایتخت

سریال پایتخت یکی از موفق‌ترین مجموعه‌های کمدی خانوادگی ایران است.

داستان درباره خانواده «معمولی» و اتفاقات طنزی است که در سفرها و زندگی روزمره برایشان رخ می‌دهد.

⭐ امتیاز کاربران: 8.7/10
🎭 ژانر: کمدی، خانوادگی
👥 بازیگران: محسن تنابنده، ریما رامین‌فر، احمد مهرانفر و...

💡 اگر دنبال سریالی شاد و خانوادگی هستی، پایتخت بهترین انتخاب است.`,

"جوکر":`😂 جوکر

جوکر یک برنامه رئالیتی‌شوی کمدی است.

در این مسابقه، شرکت‌کنندگان باید دیگران را بخندانند اما خودشان نخندند!

⭐ امتیاز کاربران: 8.8/10
🎭 ژانر: سرگرمی، کمدی
🎬 مجری: احسان علیخانی

💡 اگر از برنامه‌های طنز خوشت می‌آید، جوکر یکی از بهترین گزینه‌هاست.`,

"جیران":`🎬 جیران

جیران یک سریال تاریخی عاشقانه است که داستان عشق ناصرالدین شاه و جیران را روایت می‌کند.

⭐ امتیاز کاربران: 8.2/10
🎭 ژانر: تاریخی، عاشقانه
👥 بازیگران: پریناز ایزدیار، بهرام رادان، مهدی پاکدل

💡 اگر به داستان‌های تاریخی علاقه داری، جیران ارزش دیدن دارد.`,

"پوست شیر":`🎬 پوست شیر

پوست شیر یکی از پرطرفدارترین سریال‌های جنایی ایران است.

داستان درباره پدری است که برای پیدا کردن دخترش وارد ماجراهای خطرناکی می‌شود.

⭐ امتیاز کاربران: 8.9/10
🎭 ژانر: جنایی، معمایی
👥 بازیگران: هادی حجازی‌فر، شهاب حسینی، پانته‌آ بهرام

💡 اگر زخم کاری را دوست داشتی، احتمالاً پوست شیر هم خوشت می‌آید.`

,

"یاغی":`🎬 یاغی

اگر منظورت سریال «یاغی» باشد، این مجموعه یکی از موفق‌ترین آثار اجتماعی سال‌های اخیر است.

داستان درباره جوانی با استعداد در کشتی است که برای رسیدن به آرزوهایش با مشکلات مالی، اجتماعی و افراد سودجو روبه‌رو می‌شود.

⭐ امتیاز کاربران: 8.3/10
🎭 ژانر: اجتماعی، ورزشی، درام
👥 بازیگران: علی شادمان، پارسا پیروزفر، طناز طباطبایی و...

💡 اگر یاغی را دوست داشتی، پیشنهاد می‌کنم زخم کاری و پوست شیر را هم ببینی.`,

"قورباغه":`🎬 قورباغه

قورباغه یک سریال جنایی و رازآلود است که با فضایی متفاوت و داستانی پر از اتفاقات غیرمنتظره شناخته می‌شود.

⭐ امتیاز کاربران: 8.1/10
🎭 ژانر: جنایی، معمایی، هیجان‌انگیز
👥 بازیگران: نوید محمدزاده، صابر ابر، فرشته حسینی و...

📝 اگر به داستان‌های پر رمز و راز علاقه داری، قورباغه یکی از بهترین انتخاب‌هاست.`,

"فیلم اکشن":`🔥 پیشنهادهای FilimTo AI

اگر دنبال هیجان و صحنه‌های نفس‌گیر هستی، این فیلم‌ها را پیشنهاد می‌کنم:

🎬 John Wick
🎬 Mission Impossible
🎬 Nobody
🎬 Extraction
🎬 Mad Max: Fury Road

💡 اگر اکشن ایرانی یا خارجی مدنظرت است، فقط نام آن را بنویس تا پیشنهاد دقیق‌تری بدهم.`,

"فیلم ترسناک":`👻 پیشنهادهای FilimTo AI

اگر دنبال فیلمی هستی که آدرنالینت را بالا ببرد، این آثار را پیشنهاد می‌کنم:

🎬 The Conjuring
🎬 Insidious
🎬 Smile
🎬 The Nun
🎬 Annabelle

💡 اگر ترس روان‌شناختی یا ماورایی دوست داری، به من بگو تا دقیق‌تر راهنماییت کنم.`,

"فیلم کمدی":`😂 پیشنهادهای FilimTo AI

اگر هدفت فقط خندیدن و لذت بردن است، این فیلم‌ها عالی هستند:

🎬 Free Guy
🎬 The Mask
🎬 Mr. Bean's Holiday
🎬 Home
💡 اگر کمدی ایرانی می‌خواهی، فقط بنویس «کمدی ایرانی» تا بهترین‌ها را معرفی کنم.`
  
function startAI(){

const text=document.getElementById("searchBox").value.trim();

const status=document.getElementById("status");

status.innerHTML="🤖 FilimTo AI در حال بررسی...";

setTimeout(()=>{

if(responses[text]){

status.innerHTML=responses[text];

}else{

status.innerHTML="❌ متأسفم، این عنوان هنوز در دیتابیس FilimTo AI ثبت نشده است.";

}

},1200);

}

  function fillQuestion(text){
    document.getElementById("searchBox").value = text;
  }
  
</script>

</body>

</html>
