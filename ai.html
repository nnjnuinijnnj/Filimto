<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FilimTo AI</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="ai-page">

<h1 class="ai-logo">

🤖 FILIMTO AI

</h1>

<p class="ai-text">

هر فیلمی را از من بپرس...

</p>

<input
id="searchBox"
type="text"
placeholder="مثلاً: آیا فیلم جوکر در فیلیمو هست؟">

<br><br>

<button onclick="startAI()">

🔍 جستجو

</button>

  <div class="quick-title">
🔥 سوال‌های آماده
</div>

<div class="quick-chat">

<button onclick="fillQuestion('زخم کاری')">زخم کاری</button>

<button onclick="fillQuestion('پایتخت')">پایتخت</button>

<button onclick="fillQuestion('جوکر')">جوکر</button>

<button onclick="fillQuestion('جیران')">جیران</button>

<button onclick="fillQuestion('پوست شیر')">پوست شیر</button>

<button onclick="fillQuestion('یاغی')">یاغی</button>

<button onclick="fillQuestion('قورباغه')">قورباغه</button>

<button onclick="fillQuestion('فیلم اکشن')">فیلم اکشن</button>

<button onclick="fillQuestion('فیلم ترسناک')">فیلم ترسناک</button>

<button onclick="fillQuestion('فیلم کمدی')">فیلم کمدی</button>

</div>
  
<br><br>

<div id="status">

</div>

</div>

<script>

const responses = {

"زخم کاری":"🎬 سریال زخم کاری موجود است.",

"پایتخت":"📺 سریال پایتخت موجود است.",

"جوکر":"😂 برنامه جوکر موجود است.",

"جیران":"🎬 سریال جیران موجود است.",

"پوست شیر":"🎬 سریال پوست شیر موجود است.",

"یاغی":"🎬 سریال یاغی موجود است.",

"قورباغه":"🎬 سریال قورباغه موجود است.",

"افعی تهران":"🎬 سریال افعی تهران موجود است.",

"خاتون":"🎬 سریال خاتون موجود است.",

"دفتر یادداشت":"🎬 سریال دفتر یادداشت موجود است.",

"هیولا":"🎬 سریال هیولا موجود است.",

"قهوه تلخ":"☕ سریال قهوه تلخ موجود است.",

"فیلم اکشن":"🔥 پیشنهاد: John Wick - Nobody - Extraction",

"فیلم ترسناک":"👻 پیشنهاد: Conjuring - Smile - Insidious",

"فیلم کمدی":"😂 پیشنهاد: Free Guy - The Mask",

"فیلم عاشقانه":"❤️ پیشنهاد: Titanic - La La Land",

"فیلم علمی تخیلی":"🚀 پیشنهاد: Interstellar - Dune",

"فیلم ایرانی":"🇮🇷 پیشنهاد: فسیل - متری شیش و نیم",

"فیلم خارجی":"🌍 پیشنهاد: Oppenheimer - Joker",

"فیلم جدید":"🎬 در حال حاضر فیلم‌های جدید در حال اضافه شدن هستند.",

"سریال جدید":"📺 جدیدترین سریال‌ها در حال اضافه شدن هستند."

};

function startAI(){

const text=document.getElementById("searchBox").value.trim();

const status=document.getElementById("status");

status.innerHTML="🤖 FilimTo AI در حال بررسی...";

setTimeout(()=>{

if(responses[text]){

status.innerHTML=responses[text];

}else{

status.innerHTML="❌ متأسفم، این عنوان هنوز در دیتابیس FilimTo AI ثبت نشده است.";

}

},1200);

}

  function fillQuestion(text){
    document.getElementById("searchBox").value = text;
  }
  
</script>

</body>

</html>
